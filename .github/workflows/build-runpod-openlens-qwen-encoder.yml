name: Build RunPod OpenLens Qwen Encoder

on:
  workflow_dispatch:
    inputs:
      torch_spec:
        description: Torch package constraint
        required: false
        default: torch>=2.11.0
      torch_backend:
        description: uv PyTorch CUDA backend
        required: false
        default: cu129
  push:
    branches:
      - main
    paths:
      - docker/runpod-openlens-qwen-encoder/**
      - .github/workflows/build-runpod-openlens-qwen-encoder.yml
      - pyproject.toml
      - uv.lock

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/jsakaya/openlens-qwen-encoder

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare disk for CUDA image build
        run: |
          set -euxo pipefail
          df -h
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /opt/hostedtoolcache/go \
            /opt/hostedtoolcache/node \
            /opt/hostedtoolcache/Ruby
          docker system prune -af || true
          sudo systemctl stop docker
          sudo mkdir -p /mnt/docker
          if [ -d /var/lib/docker ]; then
            sudo rsync -a --delete /var/lib/docker/ /mnt/docker/
          fi
          echo '{"data-root":"/mnt/docker"}' | sudo tee /etc/docker/daemon.json
          sudo systemctl start docker
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/runpod-openlens-qwen-encoder/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            TORCH_SPEC=${{ github.event.inputs.torch_spec || 'torch>=2.11.0' }}
            TORCH_BACKEND=${{ github.event.inputs.torch_backend || 'cu129' }}
